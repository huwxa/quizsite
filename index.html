<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합사회 단계별 완벽 정복 시스템</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #e0e7ff;
            --success: #16a34a;
            --danger: #dc2626;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-700: #374151;
            --text-main: #1f2937;
        }

        body {
            font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
            background-color: #f8fafc;
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            line-height: 1.6;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--gray-100);
            padding-bottom: 15px;
        }

        header h1 {
            color: var(--primary);
            margin: 0 0 8px 0;
            font-size: 26px;
        }

        .level-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 25px;
        }

        @media (min-width: 600px) {
            .level-tabs { grid-template-columns: repeat(6, 1fr); }
        }

        .tab-btn {
            padding: 10px 5px;
            border: 1px solid var(--gray-200);
            background: var(--gray-100);
            color: var(--gray-700);
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            text-align: center;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .quiz-section { display: none; }
        .quiz-section.active { display: block; }

        .score-board {
            background: var(--primary-light);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--primary);
            font-size: 15px;
        }

        .card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 18px;
        }

        .q-title {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 12px;
            color: #0f172a;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .btn-check {
            padding: 10px 16px;
            background: var(--gray-700);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .feedback {
            margin-top: 10px;
            padding: 12px;
            border-radius: 6px;
            display: none;
            font-size: 13px;
        }

        .feedback.correct {
            display: block;
            background-color: #dcfce7;
            color: var(--success);
            border-left: 4px solid var(--success);
        }

        .feedback.wrong {
            display: block;
            background-color: #fee2e2;
            color: var(--danger);
            border-left: 4px solid var(--danger);
        }

        .analysis-box {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #cbd5e1;
            color: #475569;
        }

        .supplement-badge {
            display: inline-block;
            background: #f1f5f9;
            color: var(--primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎯 통합사회 레벨별 파괴 시스템 (총 90문항)</h1>
        <p>기초부터 심화까지 완벽 단계별 학습 & 취약점 처방 오답노트</p>
    </header>

    <div class="level-tabs">
        <button class="tab-btn active" onclick="switchTab('lvl1')">1. 기초</button>
        <button class="tab-btn" onclick="switchTab('lvl2')">2. 하</button>
        <button class="tab-btn" onclick="switchTab('lvl3')">3. 중</button>
        <button class="tab-btn" onclick="switchTab('lvl4')">4. 상</button>
        <button class="tab-btn" onclick="switchTab('lvl5')">5. 최상</button>
        <button class="tab-btn" onclick="switchTab('lvl6')">6. 심화</button>
    </div>

    <div id="lvl1" class="quiz-section active">
        <div class="score-board" id="score-lvl1">1단계: 핵심 용어 뼈대 잡기 (0/15)</div>
        <div id="container-lvl1"></div>
    </div>

    <div id="lvl2" class="quiz-section">
        <div class="score-board" id="score-lvl2">2단계: 교과서 기본 다지기 (0/15)</div>
        <div id="container-lvl2"></div>
    </div>

    <div id="lvl3" class="quiz-section">
        <div class="score-board" id="score-lvl3">3단계: 핵심 개념 응용하기 (0/15)</div>
        <div id="container-lvl3"></div>
    </div>

    <div id="lvl4" class="quiz-section">
        <div class="score-board" id="score-lvl4">4단계: 자료 및 변동 양상 추론 (0/15)</div>
        <div id="container-lvl4"></div>
    </div>

    <div id="lvl5" class="quiz-section">
        <div class="score-board" id="score-lvl5">5단계: 고난도 함정 및 복합 선지 분석 (0/15)</div>
        <div id="container-lvl5"></div>
    </div>

    <div id="lvl6" class="quiz-section">
        <div class="score-board" id="score-lvl6">6단계: 서술형 대비 및 최고존엄 킬러 개념 (0/15)</div>
        <div id="container-lvl6"></div>
    </div>
</div>

<script>
    // 90문항 대규모 데이터베이스 구축

            { q: "열대저기압으로 최대풍속이 17m/s 이상이며 폭염 해결에 도움을 주는 재해는?", a: ["태풍"], t: "자연재해", h: "ㅌㅍ" },

            { q: "자신의 문화만을 우월하게 여기고 타문화를 부정적으로 평가하는 문화 이해 태도는?", a: ["자문화중심주의", "자문화 중심주의"], t: "문화를 이해하는 태도", h: "ㅈㅁㅎㅈㅅㅈㅇ" },
